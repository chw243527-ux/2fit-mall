  <!-- ═══════════════════════════════════════════════

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #ffffff; }
    #loading-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #ffffff; z-index: 9999;
    }
    .loading-logo {
      width: 80px; height: 80px;
      border-radius: 18px;
      background: #1a1a2e;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
    }
    .loading-logo span {
      color: #fff; font-size: 22px; font-weight: 900; letter-spacing: -1px;
    }
    .loading-spinner {
      width: 36px; height: 36px;
      border: 3px solid #e0e0e0;
      border-top-color: #6A1B9A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- 로딩 화면 -->
  <div id="loading-screen">
    <div class="loading-logo"><span>2FIT</span></div>
    <div class="loading-spinner"></div>
  </div>

  <script>
    // SW 및 캐시 완전 제거
    (function() {
      try {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) { r.unregister(); });
          });
        }
        if ('caches' in window) {
          caches.keys().then(function(keys) {
            keys.forEach(function(k) { caches.delete(k); });
          });
        }
      } catch(e) {}
    })();

    // bfcache(앞뒤로 캐시) 복원 시 새로고침 - Flutter 재초기화
    window.addEventListener('pageshow', function(e) {
      if (e.persisted) { window.location.reload(); }
    });

    // Flutter 첫 프레임 완료 → 로딩화면 제거
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('loading-screen');
      if (el) {
        el.style.transition = 'opacity 0.3s';
        el.style.opacity = '0';
        setTimeout(function() { if (el.parentNode) el.remove(); }, 300);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>

  <!-- PWA 홈 화면 추가 배너 -->
  <script>
    let deferredPrompt = null;
    let pwaInstallShown = false;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      
      // 5초 후 설치 배너 표시 (첫 방문 또는 3일에 한 번)
      const lastShown = localStorage.getItem('pwa_install_shown');
      const now = Date.now();
      const threeDays = 3 * 24 * 60 * 60 * 1000;
      
      if (!lastShown || (now - parseInt(lastShown)) > threeDays) {
        setTimeout(() => {
          if (!pwaInstallShown && deferredPrompt) {
            showPwaInstallBanner();
          }
        }, 5000);
      }
    });

    function showPwaInstallBanner() {
      if (pwaInstallShown) return;
      pwaInstallShown = true;
      localStorage.setItem('pwa_install_shown', Date.now().toString());

      const banner = document.createElement('div');
      banner.id = 'pwa-install-banner';
      banner.innerHTML = `
        <div style="
          position: fixed;
          bottom: 80px;
          left: 50%;
          transform: translateX(-50%);
          background: #1A1A2E;
          color: white;
          border-radius: 16px;
          padding: 14px 20px;
          display: flex;
          align-items: center;
          gap: 12px;
          box-shadow: 0 8px 32px rgba(0,0,0,0.4);
          z-index: 99999;
          max-width: 340px;
          width: calc(100% - 32px);
          animation: slideUp 0.3s ease;
        ">
          <img src="icons/Icon-192.png" style="width:40px;height:40px;border-radius:10px;" alt="2FIT MALL">
          <div style="flex:1;">
            <div style="font-weight:700;font-size:14px;margin-bottom:2px;">2FIT MALL 앱 추가</div>
            <div style="font-size:12px;opacity:0.8;">홈 화면에 추가하고 빠르게 쇼핑하세요</div>
          </div>
          <button id="pwa-install-btn" style="
            background:#6C63FF;color:white;border:none;
            padding:8px 14px;border-radius:8px;
            font-size:13px;font-weight:700;cursor:pointer;
            white-space:nowrap;
          ">추가</button>
          <button id="pwa-close-btn" style="
            background:transparent;color:rgba(255,255,255,0.6);
            border:none;font-size:20px;cursor:pointer;padding:0;
            line-height:1;
          ">×</button>
        </div>
        <style>
          @keyframes slideUp {
            from { transform: translateX(-50%) translateY(20px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
          }
        </style>
      `;
      document.body.appendChild(banner);

      document.getElementById('pwa-install-btn').addEventListener('click', async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          if (outcome === 'accepted') {
            console.log('[PWA] 홈 화면에 추가됨');
          }
          deferredPrompt = null;
        }
        removeBanner();
      });

      document.getElementById('pwa-close-btn').addEventListener('click', removeBanner);

      // 8초 후 자동 제거
      setTimeout(removeBanner, 8000);
    }

    function removeBanner() {
      const banner = document.getElementById('pwa-install-banner');
      if (banner) {
        banner.style.opacity = '0';
        banner.style.transition = 'opacity 0.3s';
        setTimeout(() => banner.remove(), 300);
      }
    }

    window.addEventListener('appinstalled', () => {
      console.log('[PWA] 앱이 설치되었습니다');
      deferredPrompt = null;
      removeBanner();
    });
  </script>
</body>
</html>
