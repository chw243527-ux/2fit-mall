<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="2FIT Mall">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- Google Sign-In -->
  <meta name="google-signin-client_id" content="187081765755-web.apps.googleusercontent.com">

  <!-- iOS / PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="2FIT Mall">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>2FIT Mall</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #ffffff; }
    #loading-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #ffffff; z-index: 9999;
    }
    .loading-logo {
      width: 80px; height: 80px;
      border-radius: 18px;
      background: #1a1a2e;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
    }
    .loading-logo span {
      color: #fff; font-size: 22px; font-weight: 900; letter-spacing: -1px;
    }
    .loading-spinner {
      width: 36px; height: 36px;
      border: 3px solid #e0e0e0;
      border-top-color: #6A1B9A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- 로딩 화면 -->
  <div id="loading-screen">
    <div class="loading-logo"><span>2FIT</span></div>
    <div class="loading-spinner"></div>
  </div>

  <script>
    // SW 및 캐시 완전 제거
    (function() {
      try {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) { r.unregister(); });
          });
        }
        if ('caches' in window) {
          caches.keys().then(function(keys) {
            keys.forEach(function(k) { caches.delete(k); });
          });
        }
      } catch(e) {}
    })();

    // bfcache(앞뒤로 캐시) 복원 시 새로고침 - Flutter 재초기화
    window.addEventListener('pageshow', function(e) {
      if (e.persisted) { window.location.reload(); }
    });

    // Flutter 첫 프레임 완료 → 로딩화면 제거
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('loading-screen');
      if (el) {
        el.style.transition = 'opacity 0.3s';
        el.style.opacity = '0';
        setTimeout(function() { if (el.parentNode) el.remove(); }, 300);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
