[build]
  publish = "build/web"
  command = ""

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# HTML, manifest - 항상 최신 버전 확인
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Flutter service worker - 항상 최신 버전 확인
[[headers]]
  for = "/flutter_service_worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/flutter_bootstrap.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# JS/WASM - Flutter가 파일명에 해시값 포함시켜서 버전 자동 관리
[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "*.wasm"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# 나머지 파일들
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "no-cache, no-store, must-revalidate"
