name: twofit_mall
description: 2FIT MALL - Sports & Fitness Shopping App
publish_to: 'none'
version: 1.0.2+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: 6.1.5+1
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0
  http: 1.5.0
  archive: 3.6.1
  cached_network_image: ^3.3.1
  carousel_slider: ^5.0.0
  smooth_page_indicator: ^1.2.0+3
  flutter_svg: ^2.0.9
  intl: ^0.19.0
  uuid: ^4.4.0
  badges: ^3.1.2
  shimmer: ^3.0.0
  go_router: ^13.2.0
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  share_plus: ^12.0.1
  url_launcher: ^6.3.0
  font_awesome_flutter: ^10.7.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  webview_flutter: 4.13.0
