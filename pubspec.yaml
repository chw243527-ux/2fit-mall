  # ── 차트/그래프 ──────────────────────────────
  fl_chart: ^0.69.0

  # ── 엑셀 다운로드 ────────────────────────────
  csv: ^6.0.0
  excel: ^4.0.6
  path_provider: ^2.1.0

  # ── 구글 소셜 로그인 ─────────────────────────
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
